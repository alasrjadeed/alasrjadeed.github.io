<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina AI OS</title>
  <link rel="icon" type="image/png" href="/lumina.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 640px;
    }
    h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    p { font-size: 1.1rem; color: #c4b5fd; margin-bottom: 2rem; line-height: 1.6; }
    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.25rem; margin-bottom: 0.75rem; }
    .card p { font-size: 0.95rem; margin-bottom: 1.25rem; }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      border-radius: 999px;
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .links a { color: #93c5fd; text-decoration: none; font-size: 0.9rem; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lumina AI OS</h1>
    <p>The world's first autonomous AI employee operating system</p>
    <div class="card">
      <h2>Launch Dashboard</h2>
      <p>Access the full Lumina AI OS interface — manage agents, projects, CRM, and more.</p>
      <a href="/app/" class="btn">Open Dashboard</a>
    </div>
    <div class="links">
      <a href="https://github.com/alasrjadeed/Lumina-AI-OS" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
